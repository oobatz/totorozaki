<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ТОТОРОЗАКИ - Корзина</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Unbounded:wght@600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="cart.css" />
  </head>
  <body>
    <main class="viewport" aria-label="Корзина Тоторо Заки">
      <section class="stage">
        <img class="stage-bg" src="img/фон картинка.png" alt="" draggable="false" />
        <div class="stage-wash"></div>
        <div class="header-blur"></div>

        <header class="topbar">
          <a class="brand" href="index.html" aria-label="На главную">
            <img src="img/svg полный логотип .svg" alt="Тоторо Заки" draggable="false" />
          </a>
          <nav class="nav" aria-label="Навигация">
            <a class="nav-btn nav-games" href="games.html" aria-label="Игры">
              <img src="img/svg игры кнопка .svg" alt="" draggable="false" />
            </a>
            <button class="nav-btn nav-waiter" id="waiterBtn" type="button" aria-label="Вызвать официанта">
              <img src="img/svg вызов официанта кнопка.svg" alt="" draggable="false" />
            </button>
            <a class="nav-btn nav-cart" href="cart.html" aria-label="Корзина">
              <span class="cart-badge" id="cart-badge">0</span>
              <img src="img/svg корзина кнопка .svg" alt="" draggable="false" />
            </a>
          </nav>
        </header>

        <section class="cart-window" aria-label="Ваша корзина">
          <h1 class="cart-title">ВАША КОРЗИНА</h1>
          <button class="menu-pill" type="button" onclick="window.location.href='menu.html'">меню</button>
          <div class="bonus-card">
            <span>Бонусы</span>
            <strong id="bonuses-display">300</strong>
          </div>

          <div class="cart-list" id="cart-items-list"></div>
          <div class="cart-scroll" aria-hidden="true">
            <span class="scroll-arrow up"></span>
            <span class="scroll-track"><span id="thumb-cart" class="scroll-thumb"></span></span>
            <span class="scroll-arrow down"></span>
          </div>

          <span class="solid-rule"></span>
          <div class="summary">
            <div><span>Сумма заказа</span><strong id="sum-total">1 000 р</strong></div>
            <div><span>Обслуживание (10%)</span><strong id="sum-service">100 р</strong></div>
            <div><span>Бонусы к списанию</span><strong id="sum-bonuses">- 70 р</strong></div>
          </div>
          <span class="dash-rule"></span>
          <div class="total-row">
            <span>Итого к оплате</span>
            <strong id="sum-final">1 030 р</strong>
          </div>
          <button class="pay-btn" type="button" id="payBtn">Оплатить заказ</button>

          <div class="table-scene" aria-hidden="true">
            <div id="table-items"></div>
            <img class="table-img" src="img/стол картинка.png" alt="" draggable="false" />
          </div>
        </section>

        <div class="modal" id="waiterModal" hidden>
          <div class="modal-card">
            <img src="img/иконка офик.png" alt="" draggable="false" />
            <h2>Официант вызван</h2>
            <p>Официант скоро подойдет к вашему столику.</p>
            <button type="button" data-close="waiterModal">Хорошо</button>
          </div>
        </div>

        <div class="modal" id="payModal" hidden>
          <div class="modal-card">
            <img src="img/лого корзина.png" alt="" draggable="false" />
            <h2>Заказ оформлен</h2>
            <p>Оплата принята</p>
            <small id="modal-bonuses-earned"></small>
            <button type="button" id="closePay">Закрыть</button>
          </div>
        </div>
      </section>
    </main>

    <script src="shared.js"></script>
    <script src="cart-script.js"></script>
  </body>
</html>
