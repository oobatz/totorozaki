<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Тоторо Заки</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <main class="viewport" aria-label="Тоторо Заки">
      <section class="stage" data-node-id="1:3" data-name="ОСНОВА 1 КОД">
        <div class="background" data-node-id="1:4" data-name="фон картинка">
          <img src="img/background@2x.png" alt="" draggable="false" />
        </div>

        <div class="wash" data-node-id="1:5" data-name="блюр фона прямоугольник"></div>
        <div class="logo-glow" data-node-id="1:6" data-name="блюр лого скруг прямоугольник"></div>
        <div class="text-glow" data-node-id="1:7" data-name="блюр для надписей прямоугольник скруг"></div>

        <div class="logo-word" data-node-id="1:9" data-name="svg">
          <img src="img/logo-word.svg" alt="" draggable="false" />
        </div>
        <div class="logo-mark" data-node-id="1:40" data-name="svg">
          <img src="img/logo-mark.svg" alt="" draggable="false" />
        </div>
        <div class="mobile-logo" aria-hidden="true">
          <img src="img/svg полный логотип .svg" alt="" draggable="false" />
        </div>

        <div class="welcome-text" data-node-id="1:165" data-name="Добро пожаловать в кибер-клуб! текст">
          <span>Добро пожаловать</span><span>в кибер-клуб!</span>
        </div>

        <button class="order-hitbox" type="button" aria-label="Сделать заказ">
          <span class="cta-text" data-node-id="1:110" data-name="Нажмите, чтобы сделать заказ текст svg">
            <span>&gt; Нажмите, чтобы</span><span>сделать заказ &lt;</span>
          </span>
        </button>

        <div class="food-icons" aria-label="Категории меню">
          <button class="food-icon icon-ragu" type="button" data-target="menu.html#main" data-node-id="1:220" data-name="иконка рагу svg" aria-label="Основные блюда">
            <img src="img/icon-ragu.svg" alt="" draggable="false" />
          </button>
          <button class="food-icon icon-ramen" type="button" data-target="menu.html#main" data-node-id="1:249" data-name="иконка рамен svg" aria-label="Рамен">
            <img src="img/icon-ramen.svg" alt="" draggable="false" />
          </button>
          <button class="food-icon icon-cake" type="button" data-target="menu.html#desserts" data-node-id="1:266" data-name="иконка пирожное svg" aria-label="Пирожные">
            <img src="img/icon-cake.svg" alt="" draggable="false" />
          </button>
          <button class="food-icon icon-dessert" type="button" data-target="menu.html#desserts" data-node-id="1:317" data-name="иконка японский десерт svg" aria-label="Японские десерты">
            <img src="img/icon-dessert.svg" alt="" draggable="false" />
          </button>
          <button class="food-icon icon-tea" type="button" data-target="menu.html#drinks" data-node-id="1:277" data-name="иконка чаи svg" aria-label="Чаи">
            <img src="img/icon-tea.svg" alt="" draggable="false" />
          </button>
          <button class="food-icon icon-coffee" type="button" data-target="menu.html#drinks" data-node-id="1:282" data-name="иконка кофе svg" aria-label="Кофе">
            <img src="img/icon-coffee.svg" alt="" draggable="false" />
          </button>
          <button class="food-icon icon-lemonade" type="button" data-target="menu.html#drinks" data-node-id="1:287" data-name="иконка лимонад svg" aria-label="Лимонады">
            <img src="img/icon-lemonade.svg" alt="" draggable="false" />
          </button>
        </div>
      </section>
    </main>

    <script src="index-script.js"></script>
  </body>
</html>
