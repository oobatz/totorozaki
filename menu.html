<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Тоторо Заки - Меню</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Montserrat:wght@400;600&family=Orbitron:wght@700;800;900&family=Unbounded:wght@600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="menu.css" />
  </head>
  <body>
    <main class="viewport" aria-label="Меню Тоторо Заки">
      <section class="stage">
        <img class="stage-bg" src="img/фон картинка.png" alt="" draggable="false" />
        <div class="stage-wash"></div>
        <div class="header-layer"></div>

        <header class="topbar">
          <a class="brand" href="index.html" aria-label="На главную">
            <img src="img/svg полный логотип .svg" alt="Тоторо Заки" draggable="false" />
          </a>
          <nav class="nav" aria-label="Навигация">
            <a class="nav-btn" href="games.html" aria-label="Игры">
              <img src="img/svg игры кнопка .svg" alt="" draggable="false" />
            </a>
            <button class="nav-btn" type="button" id="waiterBtn" aria-label="Вызвать официанта">
              <img src="img/svg вызов официанта кнопка.svg" alt="" draggable="false" />
            </button>
            <a class="nav-btn cart-link" href="cart.html" aria-label="Корзина">
              <span class="cart-badge" id="cartBadge" hidden>0</span>
              <img src="img/svg корзина кнопка .svg" alt="" draggable="false" />
            </a>
          </nav>
        </header>

        <fieldset class="menu-panel panel-main" data-category="main" aria-label="Основные блюда">
          <img class="panel-frame" src="img/Group 34.svg" alt="" draggable="false" />
          <button class="expand-btn" type="button" aria-label="Развернуть основные блюда"></button>
          <legend class="panel-title-row">
            <span class="title-line"></span>
            <span class="panel-heading">ОСНОВНЫЕ БЛЮДА</span>
            <span class="title-line"></span>
          </legend>
          <div class="items-shell">
            <div class="filter-row" aria-label="Фильтры основных блюд">
              <button class="filter-btn" type="button" data-filter="seafood" aria-label="Морепродукты">
                <img src="img/кнопка рамен svg.svg" alt="" draggable="false" />
              </button>
              <button class="filter-btn" type="button" data-filter="meat" aria-label="Мясо">
                <img src="img/кнопка рагу svg.svg" alt="" draggable="false" />
              </button>
            </div>
            <div class="items-grid" id="items-main"></div>
            <div class="scroll-ui">
              <button class="scroll-arrow scroll-up" type="button" aria-label="Вверх"></button>
              <div class="scroll-track"><span class="scroll-thumb"></span></div>
              <button class="scroll-arrow scroll-down" type="button" aria-label="Вниз"></button>
            </div>
          </div>
        </fieldset>

        <fieldset class="menu-panel panel-desserts" data-category="desserts" aria-label="Десерты">
          <img class="panel-frame" src="img/Group 35.svg" alt="" draggable="false" />
          <button class="expand-btn" type="button" aria-label="Развернуть десерты"></button>
          <legend class="panel-title-row">
            <span class="title-line"></span>
            <span class="panel-heading">ДЕСЕРТЫ</span>
            <span class="title-line"></span>
          </legend>
          <div class="items-shell">
            <div class="filter-row" aria-label="Фильтры десертов">
              <button class="filter-btn" type="button" data-filter="pastry" aria-label="Пирожные">
                <img src="img/кнопка пирожное svg.svg" alt="" draggable="false" />
              </button>
              <button class="filter-btn" type="button" data-filter="japanese" aria-label="Японские десерты">
                <img src="img/кнопка японский десерт svg.svg" alt="" draggable="false" />
              </button>
            </div>
            <div class="items-grid" id="items-desserts"></div>
            <div class="scroll-ui">
              <button class="scroll-arrow scroll-up" type="button" aria-label="Вверх"></button>
              <div class="scroll-track"><span class="scroll-thumb"></span></div>
              <button class="scroll-arrow scroll-down" type="button" aria-label="Вниз"></button>
            </div>
          </div>
        </fieldset>

        <fieldset class="menu-panel panel-drinks" data-category="drinks" aria-label="Напитки">
          <img class="panel-frame" src="img/Group 36.svg" alt="" draggable="false" />
          <button class="expand-btn" type="button" aria-label="Развернуть напитки"></button>
          <legend class="panel-title-row">
            <span class="title-line"></span>
            <span class="panel-heading">НАПИТКИ</span>
            <span class="title-line"></span>
          </legend>
          <div class="items-shell">
            <div class="filter-row" aria-label="Фильтры напитков">
              <button class="filter-btn" type="button" data-filter="tea" aria-label="Чай">
                <img src="img/кнопка чай svg.svg" alt="" draggable="false" />
              </button>
              <button class="filter-btn" type="button" data-filter="coffee" aria-label="Кофе">
                <img src="img/кнопка кофе svg.svg" alt="" draggable="false" />
              </button>
              <button class="filter-btn" type="button" data-filter="lemonade" aria-label="Лимонады">
                <img src="img/кнопка лимонад svg.svg" alt="" draggable="false" />
              </button>
            </div>
            <div class="items-grid" id="items-drinks"></div>
            <div class="scroll-ui">
              <button class="scroll-arrow scroll-up" type="button" aria-label="Вверх"></button>
              <div class="scroll-track"><span class="scroll-thumb"></span></div>
              <button class="scroll-arrow scroll-down" type="button" aria-label="Вниз"></button>
            </div>
          </div>
        </fieldset>

        <div class="modal" id="waiterModal" hidden>
          <div class="modal-card">
            <img src="img/иконка офик.png" alt="" />
            <h3>Официант вызван</h3>
            <p>Официант скоро подойдет к вашему столику.</p>
            <button type="button" id="closeWaiter">Хорошо</button>
          </div>
        </div>
      </section>
    </main>

    <script src="menu-script.js"></script>
  </body>
</html>
